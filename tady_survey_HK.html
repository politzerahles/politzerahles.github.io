    <body style="background:#DCDCDC">

	<center><button onclick="openStuff();">Click here to open the experiment.</button></center>


<script type="text/javascript">

// the used links

var links = [
"https://research.sc/participant/login/dynamic/91BE39BE-4480-4168-BBB5-86C802DB2A88",
"https://research.sc/participant/login/dynamic/CFDF153C-191F-45B7-A430-6F6B1458B331",
"https://research.sc/participant/login/dynamic/2E1C34CC-307A-471E-A3F0-10944D12C1BF"
];

openStuff = function () {
    // get a random number between 0 and the number of links
    var randIdx = Math.random() * links.length;
    // round it, so it can be used as array index
    randIdx = parseInt(randIdx, 10);
    // construct the link to be opened
    var link = links[randIdx];
    // open it in a new window / tab (depends on browser setting)
    window.open(link);
};


</script>
</body>
